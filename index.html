<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruins Tactician</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <div id="game-shell">
    <header class="top-bar fantasy-frame">
      <div class="top-cluster">
        <div class="stat-pill">
          <span class="label">Round</span>
          <strong id="round-value">1</strong>
        </div>
        <div class="stat-pill">
          <span class="label">Phase</span>
          <strong id="phase-value">Preparation</strong>
        </div>
        <div class="stat-pill">
          <span class="label">Timer</span>
          <strong id="timer-value">--</strong>
        </div>
      </div>
      <div class="top-cluster center-cluster">
        <button class="speed-button is-active" data-speed="1" title="Combat speed 1x">1x</button>
        <button class="speed-button" data-speed="1.5" title="Combat speed 1.5x">1.5x</button>
        <button class="speed-button" data-speed="2" title="Combat speed 2x">2x</button>
      </div>
      <div class="top-cluster right-cluster">
        <div class="gold-readout">
          <img id="coin-icon" alt="">
          <strong id="gold-value">10</strong>
        </div>
        <button id="reset-button" class="icon-button" title="Reset game">↻</button>
      </div>
    </header>

    <main class="main-layout">
      <aside class="side-panel left-panel fantasy-frame">
        <h2>Traits</h2>
        <div id="trait-list"></div>
      </aside>

      <section class="board-stage fantasy-frame">
        <canvas id="board-canvas" width="1100" height="580" aria-label="Battle board"></canvas>
        <div id="board-banner" class="board-banner"></div>
        <button id="phase-action-button" class="primary-button">Start Combat</button>
      </section>

      <aside class="side-panel right-panel fantasy-frame">
        <section>
          <h2>Health</h2>
          <div class="health-row">
            <span>Player</span>
            <div class="meter hp-meter"><i id="player-hp-bar"></i></div>
            <strong id="player-hp-value">30</strong>
          </div>
          <div class="health-row">
            <span>AI</span>
            <div class="meter hp-meter ai"><i id="ai-hp-bar"></i></div>
            <strong id="ai-hp-value">30</strong>
          </div>
        </section>
        <section class="history-section">
          <h2>Round History</h2>
          <ol id="round-history"></ol>
        </section>
      </aside>
    </main>

    <footer class="bottom-panel fantasy-frame">
      <section class="economy-strip">
        <div class="level-panel">
          <span>Level</span>
          <strong id="level-value">3</strong>
          <div class="xp-line">
            <div class="meter xp-meter"><i id="xp-bar"></i></div>
            <small id="xp-value">0 / 6 XP</small>
          </div>
        </div>
        <button id="buy-xp-button" class="gold-button">
          <img id="xp-icon" alt="">
          Buy XP
          <small>4 gold</small>
        </button>
        <button id="refresh-button" class="gold-button">
          <span class="button-glyph">⟳</span>
          Refresh
          <small>2 gold</small>
        </button>
        <div id="income-breakdown" class="income-breakdown"></div>
      </section>

      <section class="shop-and-bench">
        <div id="shop-list" class="shop-list"></div>
        <div>
          <h2 class="bench-title">Bench</h2>
          <div id="bench-list" class="bench-list"></div>
        </div>
      </section>
    </footer>
  </div>

  <div id="toast-stack"></div>
  <div id="tooltip" role="tooltip"></div>

  <div id="game-over" class="screen-overlay" hidden>
    <div class="overlay-panel fantasy-frame">
      <h1 id="game-over-title">Victory</h1>
      <p id="game-over-copy"></p>
      <button id="play-again-button" class="primary-button">Play Again</button>
    </div>
  </div>

  <script src="./src/core/EventBus.js"></script>
  <script src="./src/core/StateMachine.js"></script>
  <script src="./src/config/gameConfig.js"></script>
  <script src="./src/config/unitConfig.js"></script>
  <script src="./src/config/traitConfig.js"></script>
  <script src="./src/config/shopConfig.js"></script>
  <script src="./src/config/roundConfig.js"></script>
  <script src="./src/utils/math.js"></script>
  <script src="./src/utils/random.js"></script>
  <script src="./src/utils/dom.js"></script>
  <script src="./src/utils/pathfinding.js"></script>
  <script src="./src/assets/spriteMap.js"></script>
  <script src="./src/assets/generatedAssets.js"></script>
  <script src="./src/assets/assetLoader.js"></script>
  <script src="./src/entities/Tile.js"></script>
  <script src="./src/entities/Bench.js"></script>
  <script src="./src/entities/Unit.js"></script>
  <script src="./src/entities/Shop.js"></script>
  <script src="./src/entities/Board.js"></script>
  <script src="./src/entities/Player.js"></script>
  <script src="./src/entities/AIPlayer.js"></script>
  <script src="./src/systems/TraitSystem.js"></script>
  <script src="./src/systems/UpgradeSystem.js"></script>
  <script src="./src/systems/EconomySystem.js"></script>
  <script src="./src/systems/TargetingSystem.js"></script>
  <script src="./src/systems/MovementSystem.js"></script>
  <script src="./src/systems/AbilitySystem.js"></script>
  <script src="./src/systems/CombatSystem.js"></script>
  <script src="./src/systems/EnemyAISystem.js"></script>
  <script src="./src/systems/DragDropSystem.js"></script>
  <script src="./src/systems/RoundSystem.js"></script>
  <script src="./src/ui/Tooltip.js"></script>
  <script src="./src/ui/TraitPanel.js"></script>
  <script src="./src/ui/HealthPanel.js"></script>
  <script src="./src/ui/ShopUI.js"></script>
  <script src="./src/ui/BenchUI.js"></script>
  <script src="./src/ui/BoardUI.js"></script>
  <script src="./src/ui/HUD.js"></script>
  <script src="./src/core/Game.js"></script>
  <script src="./src/main.js"></script>
</body>
</html>
